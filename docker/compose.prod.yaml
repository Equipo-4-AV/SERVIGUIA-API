services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: serviguia-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-serviguia}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DB:-serviguia}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend FastAPI
  server:
    build:
      context: ../
      dockerfile: server/Dockerfile
    container_name: serviguia-server
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-serviguia}
      - VITE_API_MODE=production
      # EL FIX CLAVE: Forzamos al contenedor y a Python a hablar UTF-8 nativo
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Frontend Nginx + Vite SPA
  client:
    build:
      context: ../
      dockerfile: client/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_API_MODE: production
    container_name: serviguia-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  postgres_prod_data: