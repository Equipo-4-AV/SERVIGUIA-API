name: serviguia-api

services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ../server
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
            - .venv/
        - action: rebuild
          path: ../server/requirements.txt
        - action: rebuild
          path: ../server/Dockerfile
