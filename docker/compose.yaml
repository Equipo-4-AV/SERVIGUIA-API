name: serviguia-api

services:
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ../server
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
            - .venv/
        - action: rebuild
          path: ../server/requirements.txt
        - action: rebuild
          path: ../server/Dockerfile

  client:
    build:
      context: ..
      dockerfile: client/Dockerfile
    env_file:
      - ../.env
    ports:
      - "5173:5173"
    depends_on:
      - server
    develop:
      watch:
        - action: sync
          path: ../client
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ../client/package.json
        - action: rebuild
          path: ../client/package-lock.json
        - action: rebuild
          path: ../client/Dockerfile

  db:
    image: postgres:16-alpine
    container_name: serviguia-db
    restart: always
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: