name: Backend tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: serviguia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d serviguia_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/serviguia_test
      OPENAI_API_KEY: sk-test-dummy
      PARTNER_SERVICE: test-partner
      CLIENT_APP: test-client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt

      - name: Seed test database
        working-directory: server
        run: python -m src.data.seed

      - name: Run backend tests
        working-directory: server
        run: pytest src/tests -q
